app = "mediconnect-api"
primary_region = "dfw"

[build]
  dockerfile = "backend/Dockerfile.fly"

[env]
  PORT = "3006"
  NODE_ENV = "production"

[http_service]
  internal_port = 3006
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
