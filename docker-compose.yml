services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediconnect
      POSTGRES_PASSWORD: mediconnect
      POSTGRES_DB: mediconnect
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediconnect"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3006:3006"
    environment:
      DATABASE_URL: postgresql://mediconnect:mediconnect@db:5432/mediconnect
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      NODE_ENV: production
      PORT: 3006
      CORS_ORIGIN: ${CORS_ORIGIN:-}

volumes:
  pgdata:
